<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: false, /* dark mode is handled via data-theme + CSS overrides */
      theme: {
        extend: {
          colors: {
            'bg':            '#f0faf3',
            'bg-card':       '#ffffff',
            'bg-input':      '#e9f7ee',
            'bg-hover':      '#d6f0de',
            'border-col':    '#b7dfc3',
            'txt-primary':   '#132e1c',
            'txt-secondary': '#4a7a5a',
            'txt-muted':     '#89b89a',
            'accent':        '#22a355',
            'accent-h':      '#1a8244',
            'accent-light':  '#d6f0de',
            'danger':        '#ef4444',
            'danger-light':  '#fee2e2',
            'success':       '#16a34a',
            'success-light': '#dcfce7',
            'warn':          '#f59e0b',
          },
          borderRadius: {
            'card':  '18px',
            'input': '6px',
            'tile':  '12px',
          },
          boxShadow: {
            'card':       '0 2px 12px rgba(34,120,70,0.08)',
            'card-hover': '0 4px 20px rgba(34,120,70,0.16)',
            'modal':      '0 20px 60px rgba(0,0,0,0.2)',
          },
        }
      }
    }
  </script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-bg text-txt-primary min-h-screen pb-10 font-[Segoe_UI,system-ui,sans-serif]">

  <!-- ── HEADER ── -->
  <header class="dashboard-header">

    <div class="flex flex-col gap-0.5">
      <div id="clock" class="text-4xl font-bold tracking-tight text-accent leading-none tabular-nums max-md:text-3xl">
        00:00:00
      </div>
      <div id="date" class="text-sm text-txt-secondary">Monday, January 1, 2025</div>
    </div>

    <div class="text-center max-lg:col-span-full max-lg:row-start-2 max-lg:text-left">
      <h1 id="greeting" class="text-2xl font-bold text-txt-primary leading-tight max-md:text-xl">
        Good morning!
      </h1>
      <p class="flex items-center justify-center gap-1.5 text-sm text-txt-secondary mt-1 max-lg:justify-start">
        Welcome back,
        <span id="username" class="font-semibold text-accent">Friend</span>
        <button id="edit-name-btn" class="icon-btn" title="Edit name">&#9998;</button>
      </p>
    </div>

    <div class="flex justify-end items-center max-lg:col-start-2 max-lg:row-start-1">
      <button id="theme-toggle" class="theme-btn" title="Toggle light / dark mode">
        <span id="theme-icon">🌙</span>
      </button>
    </div>

  </header>

  <!-- ── NAME MODAL ── -->
  <div id="name-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 class="modal-title">What's your name?</h2>
      <input id="name-input" type="text" placeholder="Enter your name" maxlength="30" class="field" />
      <div class="modal-actions">
        <button id="name-cancel" class="btn-secondary">Cancel</button>
        <button id="name-save"   class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- ── DAILY QUOTE BANNER ── -->
  <div id="quote-banner" class="quote-banner">
    <span id="quote-icon">💬</span>
    <blockquote id="quote-text" class="quote-text">Loading today's quote…</blockquote>
    <cite id="quote-author" class="quote-author"></cite>
  </div>

  <!-- ── MAIN GRID ── -->
  <main class="dashboard-grid">

    <!-- FOCUS TIMER -->
    <section class="card max-lg:col-start-1 max-lg:row-start-1 max-md:col-auto max-md:row-auto"
             aria-label="Focus Timer">

      <h2 class="card-title">Focus Timer</h2>

      <div id="timer-display" class="timer-display">25:00</div>

      <!-- Mode tabs -->
      <div class="flex gap-1.5 mb-4">
        <button class="mode-tab active" data-mode="focus">Focus 25m</button>
        <button class="mode-tab"        data-mode="short">Short 5m</button>
        <button class="mode-tab"        data-mode="long">Long 15m</button>
        <button class="mode-tab"        data-mode="custom">Custom</button>
      </div>

      <!-- Custom timer row (shown only when Custom tab is active) -->
      <div id="custom-timer-row" class="custom-timer-row hidden">
        <label class="custom-time-label">
          <span>Min</span>
          <input id="custom-min" type="number" min="0" max="99" value="10" class="custom-time-input" />
        </label>
        <span class="text-2xl font-bold text-txt-secondary pb-1">:</span>
        <label class="custom-time-label">
          <span>Sec</span>
          <input id="custom-sec" type="number" min="0" max="59" value="0" class="custom-time-input" />
        </label>
        <button id="custom-set-btn" class="btn-primary text-xs px-3 py-1.5">Set</button>
      </div>

      <!-- Timer controls -->
      <div class="flex gap-2 mb-3 max-md:flex-col">
        <button id="timer-start" class="btn-primary  flex-1 py-2.5 text-sm">Start</button>
        <button id="timer-stop"  class="btn-danger   flex-1 py-2.5 text-sm">Stop</button>
        <button id="timer-reset" class="btn-secondary flex-1 py-2.5 text-sm">Reset</button>
      </div>

      <p id="timer-status" class="text-center text-xs text-txt-muted min-h-[18px]">
        Ready to focus?
      </p>
    </section>

    <!-- TO-DO LIST -->
    <section class="card max-lg:col-span-full max-lg:row-start-2 max-md:col-auto max-md:row-auto"
             aria-label="To-Do List">

      <div class="flex items-center justify-between mb-5">
        <h2 class="card-title mb-0">To-Do List</h2>
        <label for="sort-select" class="sr-only">Sort tasks</label>
        <select id="sort-select" class="field text-xs py-1.5 px-2.5 w-auto">
          <option value="default">Sort: Default</option>
          <option value="az">Sort: A → Z</option>
          <option value="za">Sort: Z → A</option>
          <option value="done-last">Done Last</option>
          <option value="done-first">Done First</option>
        </select>
      </div>

      <form id="todo-form" class="flex gap-2 mb-4">
        <input id="todo-input" type="text" placeholder="Add a new task…"
               maxlength="120" autocomplete="off" class="field flex-1" />
        <button type="submit" class="btn-primary px-4 py-2.5 text-sm">+</button>
      </form>

      <ul id="todo-list" class="todo-list-grid list-none gap-2 max-h-[400px] overflow-y-auto pr-1">
        <!-- tasks injected by JS -->
      </ul>

      <p id="todo-empty" class="text-center text-txt-muted text-sm py-6">
        No tasks yet. Add one above!
      </p>

      <div class="flex justify-between items-center mt-3 pt-2.5 border-t border-border-col">
        <span id="todo-count" class="text-xs text-txt-muted">0 tasks</span>
        <button id="clear-done" class="btn-ghost text-danger text-xs px-3 py-1.5">
          Clear done
        </button>
      </div>
    </section>

    <!-- QUICK LINKS -->
    <section class="card flex flex-col min-h-[260px]
                    max-lg:col-start-2 max-lg:row-start-1 max-md:col-auto max-md:row-auto"
             aria-label="Quick Links">

      <div class="flex items-center justify-between mb-5">
        <h2 class="card-title mb-0">Quick Links</h2>
        <button id="add-link-btn" class="btn-primary text-xs px-3 py-1.5">+ Add Link</button>
      </div>

      <div id="links-grid" class="grid grid-cols-2 gap-2.5 flex-1 content-start max-md:grid-cols-3">
        <!-- links injected by JS -->
      </div>

      <p id="links-empty" class="flex-1 flex items-center justify-center text-txt-muted text-sm">
        No links yet. Add one!
      </p>

      <!-- Pagination (hidden when ≤ 4 links) -->
      <div id="links-pagination" class="hidden items-center justify-between mt-auto pt-2.5 border-t border-border-col">
        <button id="links-prev" class="btn-secondary px-3 py-1.5 text-sm disabled:opacity-30">&#8592;</button>
        <span id="links-page-indicator" class="text-xs text-txt-muted">1 / 1</span>
        <button id="links-next" class="btn-secondary px-3 py-1.5 text-sm disabled:opacity-30">&#8594;</button>
      </div>
    </section>

  </main>

  <!-- ── LINK MODAL ── -->
  <div id="link-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 id="link-modal-title" class="modal-title">Add Quick Link</h2>
      <label class="modal-label">Name
        <input id="link-name-input" type="text" placeholder="e.g. GitHub" maxlength="30" class="field" />
      </label>
      <label class="modal-label">URL
        <input id="link-url-input" type="url" placeholder="https://github.com" class="field" />
      </label>
      <label class="modal-label">Emoji / Icon (optional)
        <input id="link-icon-input" type="text" placeholder="🔗" maxlength="4" class="field" />
      </label>
      <div class="modal-actions">
        <button id="link-cancel" class="btn-secondary">Cancel</button>
        <button id="link-save"   class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- ── EDIT TASK MODAL ── -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 class="modal-title">Edit Task</h2>
      <input id="edit-input" type="text" maxlength="120" class="field" />
      <div class="modal-actions">
        <button id="edit-cancel" class="btn-secondary">Cancel</button>
        <button id="edit-save"   class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
