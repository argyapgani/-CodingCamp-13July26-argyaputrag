<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: false, /* dark mode handled via data-theme + CSS vars */
      theme: {
        extend: {
          colors: {
            /* Light — fresh green */
            'bg':           '#f0faf3',
            'bg-card':      '#ffffff',
            'bg-input':     '#e9f7ee',
            'bg-hover':     '#d6f0de',
            'border-col':   '#b7dfc3',
            'txt-primary':  '#132e1c',
            'txt-secondary':'#4a7a5a',
            'txt-muted':    '#89b89a',
            'accent':       '#22a355',
            'accent-h':     '#1a8244',
            'accent-light': '#d6f0de',
            'danger':       '#ef4444',
            'danger-light': '#fee2e2',
            'success':      '#16a34a',
            'success-light':'#dcfce7',
            'warn':         '#f59e0b',
          },
          borderRadius: {
            'card': '18px',
            'input': '6px',
            'tile': '12px',
          },
          boxShadow: {
            'card':       '0 2px 12px rgba(34,120,70,0.08)',
            'card-hover': '0 4px 20px rgba(34,120,70,0.16)',
            'modal':      '0 20px 60px rgba(0,0,0,0.2)',
          },
          fontVariantNumeric: { 'tabular': 'tabular-nums' },
        }
      }
    }
  </script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-bg text-txt-primary min-h-screen pb-10 font-[Segoe_UI,system-ui,sans-serif] transition-colors duration-200">

  <!-- ───────────────── HEADER ───────────────── -->
  <header class="grid grid-cols-[1fr_auto_1fr] items-center gap-4 px-10 py-6
                 bg-bg-card border-b border-border-col shadow-card sticky top-0 z-50
                 max-lg:grid-cols-[1fr_auto] max-lg:grid-rows-[auto_auto]
                 max-md:px-5 max-md:py-4">

    <!-- Left: clock + date -->
    <div class="flex flex-col gap-0.5 max-lg:col-start-1 max-lg:row-start-1">
      <div id="clock"
           class="text-4xl font-bold tracking-tight text-accent leading-none tabular-nums
                  max-md:text-3xl">
        00:00:00
      </div>
      <div id="date" class="text-sm text-txt-secondary">Monday, January 1, 2025</div>
    </div>

    <!-- Center: greeting -->
    <div class="text-center max-lg:col-span-full max-lg:row-start-2 max-lg:text-left">
      <h1 id="greeting" class="text-2xl font-bold text-txt-primary leading-tight max-md:text-xl">
        Good morning!
      </h1>
      <p class="flex items-center justify-center gap-1.5 text-sm text-txt-secondary mt-1 max-lg:justify-start">
        Welcome back,
        <span id="username" class="font-semibold text-accent">Friend</span>
        <button id="edit-name-btn"
                class="text-txt-muted hover:text-accent hover:bg-accent-light
                       rounded p-0.5 text-base leading-none transition-colors duration-200 border-0 bg-transparent cursor-pointer"
                title="Edit name">&#9998;</button>
      </p>
    </div>

    <!-- Right: theme toggle -->
    <div class="flex justify-end items-center max-lg:col-start-2 max-lg:row-start-1">
      <button id="theme-toggle"
              class="bg-bg-input border border-border-col rounded-full px-3.5 py-2
                     text-xl cursor-pointer hover:bg-bg-hover transition-colors duration-200 leading-none"
              title="Toggle light / dark mode">
        <span id="theme-icon">🌙</span>
      </button>
    </div>
  </header>

  <!-- ───────────────── NAME MODAL ───────────────── -->
  <div id="name-modal"
       class="modal-overlay hidden fixed inset-0 bg-black/45 backdrop-blur-sm
              flex items-center justify-center z-[500]">
    <div class="modal bg-bg-card border border-border-col rounded-card p-8
                w-[min(420px,90vw)] shadow-modal flex flex-col gap-4">
      <h2 class="text-lg font-bold text-txt-primary">What's your name?</h2>
      <input id="name-input" type="text" placeholder="Enter your name" maxlength="30"
             class="w-full px-3.5 py-2.5 bg-bg-input border border-border-col rounded-input
                    text-sm text-txt-primary outline-none
                    focus:border-accent focus:bg-bg-card transition-colors duration-200" />
      <div class="flex justify-end gap-2 mt-1">
        <button id="name-cancel"
                class="px-4 py-2 bg-bg-input text-txt-primary border border-border-col
                       rounded-input text-sm font-semibold cursor-pointer
                       hover:bg-bg-hover transition-colors duration-200">Cancel</button>
        <button id="name-save"
                class="px-4 py-2 bg-accent text-white rounded-input text-sm font-semibold
                       cursor-pointer hover:bg-accent-h transition-colors duration-200">Save</button>
      </div>
    </div>
  </div>

  <!-- ───────────────── MAIN GRID ───────────────── -->
  <main class="grid grid-cols-[320px_1fr_300px] gap-6 max-w-[1280px] mx-auto mt-8 px-10
               max-lg:grid-cols-[1fr_1fr] max-lg:px-6
               max-md:grid-cols-1 max-md:px-4 max-md:mt-5 max-md:gap-4">

    <!-- ── FOCUS TIMER ── -->
    <section class="bg-bg-card border border-border-col rounded-card p-6 shadow-card
                    hover:shadow-card-hover transition-shadow duration-200
                    max-lg:col-start-1 max-lg:row-start-1
                    max-md:col-auto max-md:row-auto"
             aria-label="Focus Timer">

      <h2 class="text-sm font-bold text-txt-primary uppercase tracking-widest mb-5">
        Focus Timer
      </h2>

      <!-- Timer display -->
      <div id="timer-display"
           class="timer-display text-6xl font-extrabold text-center tracking-tighter
                  text-accent tabular-nums mb-4 py-5 bg-accent-light rounded-tile
                  transition-colors duration-200 max-md:text-5xl">
        25:00
      </div>

      <!-- Mode tabs -->
      <div class="flex gap-1.5 mb-4">
        <button class="mode-tab active flex-1 py-1.5 text-xs font-semibold
                       bg-bg-input border border-border-col rounded-input cursor-pointer
                       text-txt-secondary hover:bg-bg-hover hover:text-txt-primary
                       transition-colors duration-200"
                data-mode="focus">Focus 25m</button>
        <button class="mode-tab flex-1 py-1.5 text-xs font-semibold
                       bg-bg-input border border-border-col rounded-input cursor-pointer
                       text-txt-secondary hover:bg-bg-hover hover:text-txt-primary
                       transition-colors duration-200"
                data-mode="short">Short 5m</button>
        <button class="mode-tab flex-1 py-1.5 text-xs font-semibold
                       bg-bg-input border border-border-col rounded-input cursor-pointer
                       text-txt-secondary hover:bg-bg-hover hover:text-txt-primary
                       transition-colors duration-200"
                data-mode="long">Long 15m</button>
        <button class="mode-tab flex-1 py-1.5 text-xs font-semibold
                       bg-bg-input border border-border-col rounded-input cursor-pointer
                       text-txt-secondary hover:bg-bg-hover hover:text-txt-primary
                       transition-colors duration-200"
                data-mode="custom">Custom</button>
      </div>

      <!-- Custom timer row -->
      <div id="custom-timer-row"
           class="custom-timer-row hidden flex items-end gap-2 mb-3.5
                  px-3.5 py-3 bg-accent-light border border-border-col rounded-input">
        <label class="flex flex-col gap-1 text-[0.72rem] font-semibold
                      text-txt-secondary uppercase tracking-wide">
          <span>Min</span>
          <input id="custom-min" type="number" min="0" max="99" value="10"
                 class="custom-time-input w-14 px-2 py-1.5 bg-bg-card border border-border-col
                        rounded-input text-base font-bold text-txt-primary text-center
                        outline-none tabular-nums focus:border-accent transition-colors duration-200" />
        </label>
        <span class="text-2xl font-bold text-txt-secondary pb-1">:</span>
        <label class="flex flex-col gap-1 text-[0.72rem] font-semibold
                      text-txt-secondary uppercase tracking-wide">
          <span>Sec</span>
          <input id="custom-sec" type="number" min="0" max="59" value="0"
                 class="custom-time-input w-14 px-2 py-1.5 bg-bg-card border border-border-col
                        rounded-input text-base font-bold text-txt-primary text-center
                        outline-none tabular-nums focus:border-accent transition-colors duration-200" />
        </label>
        <button id="custom-set-btn"
                class="px-3 py-1.5 bg-accent text-white rounded-input text-xs font-semibold
                       cursor-pointer hover:bg-accent-h transition-colors duration-200">Set</button>
      </div>

      <!-- Controls -->
      <div class="flex gap-2 mb-3 max-md:flex-col">
        <button id="timer-start"
                class="flex-1 py-2.5 bg-accent text-white rounded-input text-sm font-semibold
                       cursor-pointer hover:bg-accent-h transition-colors duration-200
                       active:scale-[0.97]">Start</button>
        <button id="timer-stop"
                class="flex-1 py-2.5 bg-bg-input text-txt-primary border border-border-col
                       rounded-input text-sm font-semibold cursor-pointer
                       hover:bg-bg-hover transition-colors duration-200 active:scale-[0.97]">Stop</button>
        <button id="timer-reset"
                class="flex-1 py-2.5 bg-transparent text-txt-secondary border border-transparent
                       rounded-input text-sm font-semibold cursor-pointer
                       hover:bg-bg-hover hover:text-txt-primary
                       transition-colors duration-200 active:scale-[0.97]">Reset</button>
      </div>

      <p id="timer-status" class="text-center text-xs text-txt-muted min-h-[18px]">
        Ready to focus?
      </p>
    </section>

    <!-- ── TO-DO LIST ── -->
    <section class="bg-bg-card border border-border-col rounded-card p-6 shadow-card
                    hover:shadow-card-hover transition-shadow duration-200
                    max-lg:col-span-full max-lg:row-start-2
                    max-md:col-auto max-md:row-auto"
             aria-label="To-Do List">

      <!-- Header row -->
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-sm font-bold text-txt-primary uppercase tracking-widest">To-Do List</h2>
        <label for="sort-select" class="sr-only">Sort tasks</label>
        <select id="sort-select"
                class="bg-bg-input border border-border-col rounded-input px-2.5 py-1.5
                       text-xs text-txt-secondary cursor-pointer outline-none
                       focus:border-accent transition-colors duration-200">
          <option value="default">Sort: Default</option>
          <option value="az">Sort: A → Z</option>
          <option value="za">Sort: Z → A</option>
          <option value="done-last">Done Last</option>
          <option value="done-first">Done First</option>
        </select>
      </div>

      <!-- Add task form -->
      <form id="todo-form" class="flex gap-2 mb-4">
        <input id="todo-input" type="text" placeholder="Add a new task…"
               maxlength="120" autocomplete="off"
               class="flex-1 px-3.5 py-2.5 bg-bg-input border border-border-col rounded-input
                      text-sm text-txt-primary outline-none
                      focus:border-accent focus:bg-bg-card transition-colors duration-200" />
        <button type="submit"
                class="px-4 py-2.5 bg-accent text-white rounded-input text-sm font-semibold
                       cursor-pointer hover:bg-accent-h transition-colors duration-200
                       active:scale-[0.97] whitespace-nowrap">Add</button>
      </form>

      <!-- Task list -->
      <ul id="todo-list"
          class="list-none flex flex-col gap-2 max-h-[400px] overflow-y-auto pr-1
                 scrollbar-thin scrollbar-thumb-border-col">
        <!-- tasks injected by JS -->
      </ul>

      <p id="todo-empty" class="text-center text-txt-muted text-sm py-6">
        No tasks yet. Add one above!
      </p>

      <!-- Footer -->
      <div class="flex justify-between items-center mt-3 pt-2.5 border-t border-border-col">
        <span id="todo-count" class="text-xs text-txt-muted">0 tasks</span>
        <button id="clear-done"
                class="px-3 py-1.5 bg-transparent text-txt-secondary border border-transparent
                       rounded-input text-xs font-semibold cursor-pointer
                       hover:bg-bg-hover hover:text-txt-primary transition-colors duration-200">
          Clear done
        </button>
      </div>
    </section>

    <!-- ── QUICK LINKS ── -->
    <section class="bg-bg-card border border-border-col rounded-card p-6 shadow-card
                    hover:shadow-card-hover transition-shadow duration-200
                    max-lg:col-start-2 max-lg:row-start-1
                    max-md:col-auto max-md:row-auto"
             aria-label="Quick Links">

      <div class="flex items-center justify-between mb-5">
        <h2 class="text-sm font-bold text-txt-primary uppercase tracking-widest">Quick Links</h2>
        <button id="add-link-btn"
                class="px-3 py-1.5 bg-accent text-white rounded-input text-xs font-semibold
                       cursor-pointer hover:bg-accent-h transition-colors duration-200
                       active:scale-[0.97]">+ Add Link</button>
      </div>

      <div id="links-grid" class="grid grid-cols-2 gap-2.5 max-md:grid-cols-3">
        <!-- links injected by JS -->
      </div>
      <p id="links-empty" class="text-center text-txt-muted text-sm py-6">
        No links yet. Add one!
      </p>
    </section>

  </main>

  <!-- ───────────────── ADD / EDIT LINK MODAL ───────────────── -->
  <div id="link-modal"
       class="modal-overlay hidden fixed inset-0 bg-black/45 backdrop-blur-sm
              flex items-center justify-center z-[500]">
    <div class="modal bg-bg-card border border-border-col rounded-card p-8
                w-[min(420px,90vw)] shadow-modal flex flex-col gap-4">
      <h2 id="link-modal-title" class="text-lg font-bold text-txt-primary">Add Quick Link</h2>

      <label class="flex flex-col gap-1.5 text-xs font-semibold text-txt-secondary">Name
        <input id="link-name-input" type="text" placeholder="e.g. GitHub" maxlength="30"
               class="w-full px-3.5 py-2.5 bg-bg-input border border-border-col rounded-input
                      text-sm text-txt-primary outline-none
                      focus:border-accent focus:bg-bg-card transition-colors duration-200" />
      </label>
      <label class="flex flex-col gap-1.5 text-xs font-semibold text-txt-secondary">URL
        <input id="link-url-input" type="url" placeholder="https://github.com"
               class="w-full px-3.5 py-2.5 bg-bg-input border border-border-col rounded-input
                      text-sm text-txt-primary outline-none
                      focus:border-accent focus:bg-bg-card transition-colors duration-200" />
      </label>
      <label class="flex flex-col gap-1.5 text-xs font-semibold text-txt-secondary">
        Emoji / Icon (optional)
        <input id="link-icon-input" type="text" placeholder="🔗" maxlength="4"
               class="w-full px-3.5 py-2.5 bg-bg-input border border-border-col rounded-input
                      text-sm text-txt-primary outline-none
                      focus:border-accent focus:bg-bg-card transition-colors duration-200" />
      </label>
      <div class="flex justify-end gap-2 mt-1">
        <button id="link-cancel"
                class="px-4 py-2 bg-bg-input text-txt-primary border border-border-col
                       rounded-input text-sm font-semibold cursor-pointer
                       hover:bg-bg-hover transition-colors duration-200">Cancel</button>
        <button id="link-save"
                class="px-4 py-2 bg-accent text-white rounded-input text-sm font-semibold
                       cursor-pointer hover:bg-accent-h transition-colors duration-200">Save</button>
      </div>
    </div>
  </div>

  <!-- ───────────────── EDIT TASK MODAL ───────────────── -->
  <div id="edit-modal"
       class="modal-overlay hidden fixed inset-0 bg-black/45 backdrop-blur-sm
              flex items-center justify-center z-[500]">
    <div class="modal bg-bg-card border border-border-col rounded-card p-8
                w-[min(420px,90vw)] shadow-modal flex flex-col gap-4">
      <h2 class="text-lg font-bold text-txt-primary">Edit Task</h2>
      <input id="edit-input" type="text" maxlength="120"
             class="w-full px-3.5 py-2.5 bg-bg-input border border-border-col rounded-input
                    text-sm text-txt-primary outline-none
                    focus:border-accent focus:bg-bg-card transition-colors duration-200" />
      <div class="flex justify-end gap-2 mt-1">
        <button id="edit-cancel"
                class="px-4 py-2 bg-bg-input text-txt-primary border border-border-col
                       rounded-input text-sm font-semibold cursor-pointer
                       hover:bg-bg-hover transition-colors duration-200">Cancel</button>
        <button id="edit-save"
                class="px-4 py-2 bg-accent text-white rounded-input text-sm font-semibold
                       cursor-pointer hover:bg-accent-h transition-colors duration-200">Save</button>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
